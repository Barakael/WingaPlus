<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WingaPro — Offline</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #f8fafc;
        color: #1e293b;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
        text-align: center;
      }
      .icon-wrap {
        width: 80px;
        height: 80px;
        background: #1973AE;
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 24px;
      }
      .icon-wrap img { width: 52px; height: 52px; object-fit: contain; }
      h1 { font-size: 22px; font-weight: 700; color: #1973AE; margin-bottom: 10px; }
      p  { font-size: 15px; color: #64748b; line-height: 1.6; max-width: 300px; }
      .dot {
        width: 8px; height: 8px;
        background: #cbd5e1;
        border-radius: 50%;
        display: inline-block;
        margin: 28px 4px 0;
        animation: blink 1.4s infinite both;
      }
      .dot:nth-child(2) { animation-delay: .2s; }
      .dot:nth-child(3) { animation-delay: .4s; }
      @keyframes blink {
        0%, 80%, 100% { opacity: .2; transform: scale(.8); }
        40%            { opacity: 1;   transform: scale(1); }
      }
      small { display: block; margin-top: 12px; font-size: 13px; color: #94a3b8; }
    </style>
  </head>
  <body>
    <div class="icon-wrap">
      <img src="/favicon-wing.png" alt="WingaPro" />
    </div>
    <h1>You're Offline</h1>
    <p>Check your connection — WingaPro will reconnect automatically.</p>
    <div>
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>
    <small>Waiting for connection&hellip;</small>
    <script>
      window.addEventListener('online', function () {
        window.location.replace('/');
      });
    </script>
  </body>
</html>
